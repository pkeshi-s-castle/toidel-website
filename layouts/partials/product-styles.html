<div class="styles">
	{{ $permalink := .Permalink | relURL }}
	{{ $image := .Params.picture }}
	{{ if and (not $image) .Params.styles (gt (len .Params.styles) 0) }}
		{{ $image = (index .Params.styles 0).image }}
	{{ end }}

	{{ with $image }}
		<div class="style" data-item-id="0">
			<a href="{{ $permalink }}">
				<img src="{{ . | relURL }}" alt="{{ $.Title }}">
			</a>
		</div>
	{{ end }}
</div>
