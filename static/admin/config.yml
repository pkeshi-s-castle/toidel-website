backend:
  name: github
  repo: pkeshi-s-castle/toidel-website
  branch: main
  base_url: https://toidel-website.pages.dev
  auth_endpoint: api/auth

media_folder: static/images/products
public_folder: /images/products

site_url: https://toidel-website.pages.dev
display_url: https://toidel-website.pages.dev

collections:
  - name: products
    label: Products
    label_singular: Product
    folder: content/products
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{name}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string", required: false, hint: "Internal title used by Hugo." }
      - { label: "Product Name", name: "name", widget: "string", required: true }
      - { label: "Description", name: "description_markdown", widget: "markdown", required: true }
      - { label: "Price", name: "price", widget: "string", required: false, hint: "Example: 9.00" }
      - { label: "SKU", name: "sku", widget: "string", required: false }
      - { label: "Stock", name: "stock", widget: "number", required: false, value_type: "int", min: 0 }
      - label: "Garment Type"
        name: "garment_type"
        widget: "select"
        required: false
        options:
          - hat
          - top
      - label: "Sizes"
        name: "sizes"
        widget: "list"
        required: false
        default:
          - XS
          - Small
          - Medium
          - Large
          - XL
      - label: "Styles"
        name: "styles"
        widget: "list"
        required: true
        summary: "{{fields.name}}"
        fields:
          - { label: "Style Name", name: "name", widget: "string", required: true }
          - { label: "Color", name: "color", widget: "color", required: false }
          - { label: "Image", name: "image", widget: "image", required: true }
