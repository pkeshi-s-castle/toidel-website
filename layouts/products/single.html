{{ define "main" }}
<div class="product-container">
	{{ partial "product-styles" . }}
	<div class="product-details" id="inquire">
		<h3>{{ .Params.name | default .Title }}</h3>
		{{ with (.Params.description | default .Params.description_markdown) }}
			{{ . | markdownify }}
		{{ end }}
		<div class="button">{{ partial "whatsapp-button" . }}</div>
	</div>
</div>
{{ end }}
