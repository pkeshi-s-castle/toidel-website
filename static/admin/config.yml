backend:
  name: github
  repo: pkeshi-s-castle/toidel-website
  branch: main
  base_url: https://toidel.com
  auth_endpoint: api/auth

media_folder: static/images/products
public_folder: /images/products

site_url: https://toidel.com
display_url: https://toidel.com

collections:
  - name: products
    label: Products
    label_singular: Product
    folder: content/products
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{name}}"
    editor:
      preview: false
    fields:
      - { label: "Name", name: "name", widget: "string", required: true }
      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        default: "gifting-items"
        options:
          - { label: "Water Tumblers & Sippers", value: "water-tumblers-sippers" }
          - { label: "Games & Toys", value: "games-toys" }
          - { label: "Gifting Items", value: "gifting-items" }
      - { label: "Price (INR)", name: "price", widget: "number", required: false, value_type: "int", min: 0 }
      - { label: "Description", name: "description", widget: "markdown", required: false }
      - label: "Pictures"
        name: "pictures"
        widget: "list"
        required: true
        min: 1
        field: { label: "Picture", name: "picture", widget: "image" }
