<div class="styles">
	{{ $permalink := .Permalink | relURL }}
	{{ $image := .Params.picture }}
	{{ $productName := .Params.name | default .Title }}

	{{ with $image }}
		<div class="style" data-item-id="0">
			<a href="{{ $permalink }}">
				<img src="{{ . | relURL }}" alt="{{ $productName }}">
			</a>
		</div>
	{{ end }}
</div>
